name: Validate n8n Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Validate workflow JSON is parseable
        run: |
          echo "Validating workflow JSON structure..."
          python3 -c "
          import json, sys
          with open('chatgpt-usage-report-workflow.json', 'r') as f:
              data = json.load(f)
          print('JSON is valid and parseable')
          print(f'Workflow name: {data.get(\"name\", \"unnamed\")}')
          "

      - name: Check for exposed API keys
        run: |
          echo "Scanning for exposed credentials..."
          if grep -r "sk-ant-api" . --include="*.json"; then
            echo "ERROR: Anthropic API key detected in repository"
            exit 1
          else
            echo "No exposed API keys found - clean"
          fi

      - name: Verify required n8n nodes are present
        run: |
          echo "Checking required nodes exist in workflow..."
          python3 -c "
          import json
          with open('chatgpt-usage-report-workflow.json', 'r') as f:
              data = json.load(f)
          nodes = [n['type'] for n in data.get('nodes', [])]
          print(f'Nodes found: {nodes}')
          required = ['n8n-nodes-base.set', 'n8n-nodes-base.httpRequest']
          for r in required:
              if r in nodes:
                  print(f'PASS: {r} present')
              else:
                  print(f'WARN: {r} not found')
          "

      - name: All checks passed
        run: echo "Workflow validation complete - ready for deployment"
